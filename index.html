<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 청소년부 수련회 40일 릴레이 기도 달력</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-light: #e6f0fa;
            --text-main: #2d3748;
            --bg-main: #f7fafc;
            --border-color: #e2e8f0;
            --accent-color: #e28743;
        }

        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            color: var(--primary-color);
            margin: 0 0 8px 0;
            font-size: 1.8rem;
        }

        header p.main-tag {
            color: #4a5568;
            margin: 0 0 15px 0;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .view-schedule-btn {
            background-color: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: block;
            margin: 0 auto;
        }

        .view-schedule-btn:hover {
            background-color: var(--primary-color);
            color: white;
            transform: translateY(-1px);
        }

        .calendar-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .calendar-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 20px;
        }

        .calendar-title {
            text-align: center;
            font-size: 1.25rem;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 15px;
            color: #1a202c;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            text-align: center;
        }

        .weekday {
            font-weight: bold;
            color: #718096;
            font-size: 0.85rem;
            padding-bottom: 5px;
        }

        .day {
            position: relative;
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #cbd5e0;
            background-color: #f7fafc;
        }

        .day.current-month {
            color: #4a5568;
            background-color: white;
            border: 1px solid var(--border-color);
        }

        .day.highlighted {
            background-color: var(--primary-light);
            border: 2px solid var(--primary-color);
            color: #2b6cb0;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .day.highlighted:hover {
            background-color: #bee3f8;
            transform: translateY(-2px);
        }

        .day .d-label {
            font-size: 0.65rem;
            color: var(--primary-color);
            margin-top: 2px;
            font-weight: bold;
        }

        .day.selected {
            background-color: var(--primary-color) !important;
            color: white !important;
        }
        .day.selected .d-label {
            color: white !important;
        }

        .details-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 25px;
            border-top: 4px solid var(--primary-color);
        }

        .details-header {
            font-size: 1.3rem;
            font-weight: bold;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .details-header .date-str {
            color: #718096;
            font-size: 1rem;
            font-weight: normal;
        }

        /* 상세 내용 창 내부 안내 문구 스타일 */
        .notice-box {
            background-color: var(--primary-light);
            color: #2b6cb0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            margin-top: 15px;
            border-left: 4px solid var(--primary-color);
        }

        .info-section {
            margin-top: 20px;
        }

        .info-label {
            font-weight: bold;
            color: #4a5568;
            display: inline-block;
            background: #e2e8f0;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 8px;
        }

        .prayer-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-left: 5px;
        }

        .common-topic {
            color: #2d3748;
            background: #fdf2e9;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            font-size: 0.95rem;
            white-space: pre-line;
        }

        .bible-verse {
            font-style: italic;
            color: #2d3748;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #cbd5e1;
            font-size: 0.95rem;
        }

        .meditation {
            color: #2d3748;
            background: #fff;
            padding: 5px;
            font-size: 0.95rem;
            white-space: pre-line;
        }
        
        .prayer-topic {
            white-space: pre-line;
            color: #2d3748;
            background: #fafafa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: white;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            position: relative;
        }

        .modal-header {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            font-size: 1.5rem;
            font-weight: bold;
            color: #a0aec0;
            cursor: pointer;
        }

        .close-btn:hover {
            color: #4a5568;
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .schedule-table th, .schedule-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .schedule-table th {
            background-color: #f7fafc;
            color: #4a5568;
            font-weight: bold;
            position: sticky;
            top: 0;
        }
        
        .schedule-table tr.today-highlight {
            background-color: #fffaf0;
            font-weight: bold;
        }
        .schedule-table tr.today-highlight td:last-child {
            color: var(--accent-color);
        }
    </style>
</head>

</div>

    const dDayStart = new Date("2026-07-05");
    const dDayEnd = new Date("2026-08-14");

    function generateCalendar(containerId, year, month, startBlank, totalDays) {
        const container = document.getElementById(containerId);
        
        for (let i = 0; i < startBlank; i++) {
            const blank = document.createElement("div");
            blank.classList.add("day");
            container.appendChild(blank);
        }

        for (let day = 1; day <= totalDays; day++) {
            const dayDiv = document.createElement("div");
            dayDiv.classList.add("day", "current-month");
            dayDiv.innerText = day;

            const currentStr = `${year}-${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const currentDate = new Date(currentStr);

            if (currentDate >= dDayStart && currentDate < new Date("2026-08-14")) {
                dayDiv.classList.add("highlighted");
                
                const timeDiff = dDayEnd.getTime() - currentDate.getTime();
                const daysDiff = Math.ceil(timeDiff / (1000 * 3600 * 24));
                
                const dLabel = document.createElement("div");
                dLabel.classList.add("d-label");
                dLabel.innerText = `D-${daysDiff}`;
                dayDiv.appendChild(dLabel);

                dayDiv.addEventListener("click", () => {
                    document.querySelectorAll(".day.selected").forEach(el => el.classList.remove("selected"));
                    dayDiv.classList.add("selected");

                    document.getElementById("target-dday").innerText = `⏳ 릴레이 기도 D-${daysDiff}`;
                    document.getElementById("target-date").innerText = `${year}년 ${month}월 ${day}일`;
                    
                    const data = prayerData[daysDiff];
                    if (data) {
                        document.getElementById("prayerName").innerText = data.speaker;
                        document.getElementById("commonTopic").innerText = globalCommonTopic;
                        document.getElementById("bibleVerse").innerText = data.verse;
                        document.getElementById("meditationText").innerText = data.meditation;
                        document.getElementById("prayerTopic").innerText = data.topic;
                    }
                });
            }
            container.appendChild(dayDiv);
        }
    }

    generateCalendar("july-calendar", 2026, 7, 3, 31);
    generateCalendar("august-calendar", 2026, 8, 6, 31);

    function buildModalTable() {
        const tbody = document.getElementById("modalTableBody");
        const today = new Date();
        today.setHours(0,0,0,0);

        for (let i = 40; i >= 1; i--) {
            const data = prayerData[i];
            if (!data) continue;

            const tr = document.createElement("tr");
            
            const timeDiff = (41 - i) - 1; 
            const targetDate = new Date(dDayStart.getTime() + (timeDiff * 24 * 60 * 60 * 1000));
            if (targetDate.getTime() === today.getTime()) {
                tr.classList.add("today-highlight");
            }

            tr.innerHTML = `
                <td>${data.dateStr}</td>
                <td>D-${i}</td>
                <td>${data.speaker}</td>
            `;
            tbody.appendChild(tr);
        }
    }

    const modal = document.getElementById("scheduleModal");
    const openBtn = document.getElementById("openModalBtn");
    const closeBtn = document.getElementById("closeModalBtn");

    openBtn.onclick = () => modal.style.display = "flex";
    closeBtn.onclick = () => modal.style.display = "none";
    window.onclick = (e) => { if (e.target === modal) modal.style.display = "none"; };

    function initTodaySelection() {
        const today = new Date();
        today.setHours(0,0,0,0);
        
        let targetElement = null;
        const highlightedDays = document.querySelectorAll(".day.highlighted");
        
        highlightedDays.forEach(el => {
            const monthTitle = el.closest(".calendar-card").querySelector(".calendar-title").innerText;
            const isAugust = monthTitle.includes("8월");
            const dayNum = parseInt(el.childNodes[0].textContent);
            
            const compareDate = new Date(2026, isAugust ? 7 : 6, dayNum);
            if (compareDate.getTime() === today.getTime()) {
                targetElement = el;
            }
        });

        if (!targetElement) {
            if (today < dDayStart) targetElement = highlightedDays[0];
            else targetElement = highlightedDays[highlightedDays.length - 1];
        }

        if (targetElement) targetElement.click();
    }

    buildModalTable();
    initTodaySelection();
</script>
